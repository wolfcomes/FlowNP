checkpointing:
  every_n_epochs: 1
  monitor: val_total_loss
  save_last: true
  save_top_k: 3
dataset:
  atom_map:
  - C
  - N
  - O
  - F
  - P
  - S
  - Cl
  - Br
  - I
  - B
  dataset_name: crossdock
  dataset_size: null
  processed_data_dir: data/crossdock_kekulized
  raw_data_dir: data/crossdock_raw
  explicit_aromaticity: false

interpolant_scheduler:
  params:
    a: 2
    c: 2
    e: 1.5
    x: 1
  schedule_type:
    a: linear
    c: linear
    e: linear
    x: linear
lr_scheduler:
  base_lr: 0.0001
  restart_interval: 47
  restart_type: cosine
  warmup_length: 3.0
  weight_decay: 1.0e-12
mol_fm:
  prior_config:
    a:
      align: false
      kwargs: {}
    c:
      align: false
      kwargs: {}
    e:
      align: false
      kwargs: {}
    x:
      align: true
      kwargs:
        std: 1.0
  target_blur: 0.0
  time_scaled_loss: false
  total_loss_weights:
    a: 0.4
    c: 1.0
    e: 2.0
    x: 3.0
  weight_ae: false
  exclude_charges: false

resume:
  run_id: paiokchu
training:
  batch_size: 16
  evaluation:
    mols_to_sample: 64
    sample_interval: 1.0
    val_loss_interval: 1.0
  max_num_edges: 400000.0
  num_workers: 8
  output_dir: checkpoints_crossdock/
  trainer_args:
    accelerator: gpu
    accumulate_grad_batches: 1
    devices: 1
    gradient_clip_algorithm: value
    gradient_clip_val: 1.0
    limit_val_batches: 1.0
    max_epochs: 50
    num_nodes: 1
    strategy: auto
vector_field:
  convs_per_update: 1
  high_confidence_threshold: 0.0
  message_norm: 100
  n_cp_feats: 4
  n_hidden_edge_feats: 256
  n_hidden_scalars: 256
  n_message_gvps: 4
  n_molecule_updates: 8
  n_recycles: 1
  n_update_gvps: 4
  n_vec_channels: 128
  rbf_dim: 32
  rbf_dmax: 14
  separate_mol_updaters: true
  stochasticity: 10.0
  update_edge_w_distance: true
  enable_dynamic_graph: true
  knn_connectivity: 12
  sde: true
  n_hidden_edge_feats_pocket: 128
  n_hidden_scalars_pocket: 128
  n_vec_channels_pocket: 64


pretrain_config:
  pretrain_path: checkpoints_coconut/SDE-kekulized-v4-enhanced/checkpoints/last.ckpt
  is_freeze: true
